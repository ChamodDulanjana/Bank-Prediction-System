version: 0.2

phases:
  pre_build:
    commands:
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 600627330740.dkr.ecr.us-east-1.amazonaws.com
  build:
    commands:
      - docker build -t bps .
      - docker tag bps:latest 600627330740.dkr.ecr.us-east-1.amazonaws.com/bps:latest
  post_build:
    commands:
      - docker push 600627330740.dkr.ecr.us-east-1.amazonaws.com/bps:latest
      - echo Writing image definitions file...
      - printf '[{"name":"bps","imageUri":"%s"}]' 600627330740.dkr.ecr.eu-north-1.amazonaws.com/bps:latest > imagedefinitions.json
artifacts:
  files: 
  - imagedefinitions.json